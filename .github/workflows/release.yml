name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  readiness:
    name: Release readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-chi-sim

      - name: Install backend
        run: python -m pip install -e "backend[observability,test,docs]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Run full readiness profile
        run: python scripts/run-release-readiness.py --profile full --json
